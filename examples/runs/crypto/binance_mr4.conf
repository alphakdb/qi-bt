# mr_4 on Binance crypto — Bollinger Band MR with RSI filter, both sides
# Full exit suite: stop loss, take profit, signal exit. Run: qbt run binance_mr4

strategy       = mr_4
data           = qi.binance
universe       = crypto.txt

interval       = 1m
start          = 2025.01.01D00:00
end            = 2025.03.31D00:00
warmup         = auto

enter_at       = next_open
enter_slip     = 5bps
exit_at        = next_open
exit_slip      = 5bps

initial_equity = 10000
leverage       = 1.0
fees           = 10bps
